<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Bank App</title>

<style>
body {
    font-family: Arial;
    background: #f2f4f7;
    margin: 0;
}

/* LOGIN */
.login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    width: 300px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #c40000;
    color: white;
    border: none;
    cursor: pointer;
}

/* DASHBOARD */
.dashboard {
    display: none;
}

.header {
    background: #c40000;
    color: white;
    padding: 15px;
    text-align: center;
}

.balance {
    padding: 20px;
    text-align: center;
}

.amount {
    font-size: 30px;
    margin: 10px 0;
}
</style>

</head>

<body>

<!-- LOGIN PAGE -->
<div class="login" id="loginPage">
    <div class="login-box">
        <h2>Demo Bank</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="error" style="color:red;"></p>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="header">DEMO BANK</div>

    <div class="balance">
        <h3>Welcome, <span id="user"></span></h3>
        <p>Available Balance</p>
        <div class="amount">$2,500</div>
    </div>
</div>

<script>
function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(username === "admin" && password === "1234") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("user").innerText = username;
    } else {
        document.getElementById("error").innerText = "Invalid login details";
    }
}
</script>

</body>
</html>
